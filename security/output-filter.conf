# Magic Hat — Agent Output Sanitizer Configuration
# Copyright (c) 2026 George Scott Foley — MIT License
#
# Deployed to /etc/magichat/output-filter.conf
# Configures patterns that must NEVER appear in agent output
# sent to external channels (email, mesh, API responses).
#
# OWASP ASI06 — Data Leakage via Tools
# The Lethal Trifecta — prevents sensitive data from reaching external channels.

[general]
# Enable output filtering (disable only for debugging)
enabled = true

# Log filtered content for audit (redacted)
audit_log = true

# Action on match: redact | block | warn
action = redact

# Replacement text for redacted content
redaction_text = [REDACTED]

[patterns]
# ── Credentials & Secrets ─────────────────────────────────────────────────────
# API keys (common formats)
api_key = (?i)(api[_-]?key|apikey|api[_-]?secret)\s*[:=]\s*\S+
bearer_token = (?i)bearer\s+[a-zA-Z0-9\-._~+/]+=*
jwt_token = eyJ[a-zA-Z0-9\-_]+\.eyJ[a-zA-Z0-9\-_]+\.[a-zA-Z0-9\-_]+

# AWS credentials
aws_key = (?:AKIA|ASIA)[A-Z0-9]{16}
aws_secret = (?i)aws[_-]?secret[_-]?access[_-]?key\s*[:=]\s*\S+

# Private keys
private_key = -----BEGIN\s+(RSA|EC|OPENSSH|DSA|ENCRYPTED)?\s*PRIVATE\s+KEY-----

# Database connection strings
db_connection = (?i)(postgres|mysql|mongodb|redis)://[^\s]+@[^\s]+

# Generic passwords in config format
password_config = (?i)(password|passwd|pwd)\s*[:=]\s*\S+

# ── PII (Personally Identifiable Information) ─────────────────────────────────
# US Social Security numbers
ssn = \b\d{3}-\d{2}-\d{4}\b

# Credit card numbers (Luhn-valid patterns)
credit_card = \b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b

# Email addresses (only in contexts that suggest PII dumps)
# email_bulk = (?i)(?:email|contact|patient|client)\s*[:=]\s*\S+@\S+

# ── PHI (Protected Health Information) — HIPAA ────────────────────────────────
# Medical Record Numbers (common formats)
mrn = (?i)(mrn|medical\s*record|patient\s*id)\s*[:=]\s*\S+

# Diagnosis codes with patient context
diagnosis_context = (?i)(diagnosis|icd[_-]?10?|dx)\s*[:=]\s*\S+

# ── Internal Infrastructure ───────────────────────────────────────────────────
# Internal IPs (should not leak externally)
internal_ip = \b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b

# File paths revealing server structure
server_paths = (?:/etc/magichat/|/home/magichat/\.|/var/lib/pgsql/)

[allowlist]
# Patterns that override filters (e.g., example data in docs)
example_ssn = 000-00-0000
example_card = 4111111111111111
localhost = 127.0.0.1
