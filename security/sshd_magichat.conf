#
# Deployed to /etc/ssh/sshd_config.d/99-magichat.conf
# Overrides defaults with defense-in-depth SSH settings.
#
# Supports certificate-based auth via internal CA.
# Generate CA: ssh-keygen -t ed25519 -f /etc/ssh/magichat_ca -C "Magic Hat CA"
# Sign user key: ssh-keygen -s /etc/ssh/magichat_ca -I user@host -n magichat -V +52w user_key.pub

# ── Authentication ────────────────────────────────────────────────────────────
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey

# Certificate authority (uncomment after generating CA key)
# TrustedUserCAKeys /etc/ssh/magichat_ca.pub

# Limit auth attempts
MaxAuthTries 3
MaxSessions 3
LoginGraceTime 30

# ── Access Control ────────────────────────────────────────────────────────────
AllowUsers magichat
AllowGroups wheel

# ── Protocol Hardening ────────────────────────────────────────────────────────
Protocol 2
HostKey /etc/ssh/ssh_host_ed25519_key
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# ── Session ───────────────────────────────────────────────────────────────────
ClientAliveInterval 300
ClientAliveCountMax 2
TCPKeepAlive no

# ── Restrict Features ─────────────────────────────────────────────────────────
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
PermitTunnel no
GatewayPorts no
PermitUserEnvironment no
DisableForwarding yes

# ── Logging ───────────────────────────────────────────────────────────────────
LogLevel VERBOSE
SyslogFacility AUTH

# ── Banner ────────────────────────────────────────────────────────────────────
Banner /etc/ssh/magichat_banner
