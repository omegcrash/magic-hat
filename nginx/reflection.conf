#
# TLS is configured by certbot on first boot.
# This file handles HTTP→HTTPS redirect and proxying to Reflection.

upstream reflection_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # TLS — certbot will manage these after first-boot
    # Placeholder self-signed cert is generated during install
    ssl_certificate /etc/pki/tls/certs/magichat-selfsigned.pem;
    ssl_certificate_key /etc/pki/tls/private/magichat-selfsigned.key;

    # TLS hardening
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request limits
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # Proxy to Reflection
    location / {
        proxy_pass http://reflection_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Health check (no auth, no logging)
    location = /health {
        proxy_pass http://reflection_backend/health;
        access_log off;
    }

    # Static assets (if any)
    location /static/ {
        alias /home/magichat/.reflection/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
