# Magic Hat — Nginx Reverse Proxy for Reflection
# Copyright (c) 2026 George Scott Foley — MIT License
#
# TLS is configured by certbot on first boot.
# This file handles HTTP→HTTPS redirect and proxying to Reflection.
# Security: OWASP Top 10, CIS Nginx Benchmark, AI-specific threat mitigations.

# Rate limiting zones (OWASP ASI02 — tool misuse / brute force)
limit_req_zone $binary_remote_addr zone=api_rate:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_rate:10m rate=60r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream reflection_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # TLS — certbot will manage these after first-boot
    # Placeholder self-signed cert is generated during install
    ssl_certificate /etc/pki/tls/certs/magichat-selfsigned.pem;
    ssl_certificate_key /etc/pki/tls/private/magichat-selfsigned.key;

    # TLS hardening — TLS 1.3 only, AEAD ciphers
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers — OWASP recommendations
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Hide server version
    server_tokens off;

    # Request limits
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 30s;
    client_body_buffer_size 16k;
    large_client_header_buffers 4 8k;

    # Connection limits
    limit_conn conn_limit 50;

    # General rate limit
    limit_req zone=general_rate burst=100 nodelay;

    # ── Authentication endpoints (strict rate limit) ──────────────────────────
    location ~ ^/api/(auth|login|token) {
        limit_req zone=auth_rate burst=3 nodelay;
        proxy_pass http://reflection_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints (moderate rate limit) ───────────────────────────────────
    location /api/ {
        limit_req zone=api_rate burst=50 nodelay;
        proxy_pass http://reflection_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;

        # Prevent request smuggling
        proxy_set_header Transfer-Encoding "";
    }

    # ── WebSocket (for dashboard live updates) ────────────────────────────────
    location /ws {
        proxy_pass http://reflection_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── Main application ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://reflection_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Health check (no auth, no logging, no rate limit)
    location = /health {
        proxy_pass http://reflection_backend/health;
        access_log off;
        limit_req off;
    }

    # Static assets (if any)
    location /static/ {
        alias /home/magichat/.reflection/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Block dangerous paths ─────────────────────────────────────────────────
    # Dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Common exploit paths
    location ~ /(wp-admin|wp-login|xmlrpc|phpmyadmin|adminer|\.env|\.git) {
        deny all;
        access_log /var/log/nginx/blocked.log;
        return 444;
    }

    # Block SQL injection attempts in URL
    location ~* "(union|select|insert|delete|drop|update|exec|script|eval)" {
        deny all;
        return 444;
    }
}
