# Magic Hat — Nginx Reverse Proxy for Netdata
# Copyright (c) 2026 George Scott Foley — MIT License
#
# Proxies /netdata/ → http://localhost:19999 (Netdata Real-Time Metrics)
#
# Netdata API is read-only and unauthenticated by default.
# We add HTTP Basic Auth at the nginx layer for external access.
# Internal-only access (127.0.0.1) skips auth for Familiar skill API calls.

location /netdata/ {
    # Netdata web dashboard and API
    proxy_pass http://127.0.0.1:19999/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Netdata uses WebSocket for streaming metrics
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;

    # Rewrite sub-paths for Netdata's relative asset paths
    proxy_redirect / /netdata/;

    # Header rewrites so Netdata JS loads assets from the correct sub-path
    sub_filter_once off;
    sub_filter_types text/html application/javascript;

    # Rate limit — metrics API can be polled frequently
    limit_req zone=api_rate burst=200 nodelay;

    # Netdata CSP — relaxed for its charts/React components
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:; frame-ancestors 'self';" always;
}

# Netdata streaming API — used by Familiar skills/netdata/skill.py
# Internal access only (Familiar daemon runs locally)
location /netdata/api/ {
    # Only allow local access for direct API calls from Familiar skills
    allow 127.0.0.1;
    allow ::1;
    deny all;

    proxy_pass http://127.0.0.1:19999/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_buffering off;
}
