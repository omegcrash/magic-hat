# Magic Hat — Nginx reverse proxy for Pi-hole admin panel
# Exposes Pi-hole at https://<server>/pihole/
# Pi-hole container listens on 127.0.0.1:8053
#
# Included by the main nginx.conf / conf.d/ loader.
# Installed by privacy-suite.sh into /etc/nginx/conf.d/pihole.conf
#
# Copyright (c) 2026 George Scott Foley — MIT License

# Pi-hole upstream
upstream pihole_upstream {
    server 127.0.0.1:8053;
    keepalive 4;
}

# /pihole/ → Pi-hole admin
location /pihole/ {
    # Strip /pihole prefix — Pi-hole expects to serve from /admin/
    rewrite ^/pihole(/.*)$ $1 break;
    proxy_pass         http://pihole_upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Pi-hole uses basic auth — forward credentials
    proxy_set_header   Authorization     $http_authorization;

    proxy_read_timeout  30s;
    proxy_connect_timeout 5s;

    # Security headers
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header X-Content-Type-Options  nosniff    always;
}

# API passthrough for Pi-hole JSON API (/api/v1/...)
location /pihole/api/ {
    rewrite ^/pihole(/api/.*)$ $1 break;
    proxy_pass http://pihole_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 30s;
}
