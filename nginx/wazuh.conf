# Magic Hat — Nginx Reverse Proxy for Wazuh Dashboard
# Copyright (c) 2026 George Scott Foley — MIT License
#
# Proxies /wazuh/ → http://localhost:5601 (Wazuh OpenSearch Dashboard)
# Rate-limits the Wazuh API path and dashboard separately.
# Note: Wazuh Dashboard uses the same CSP directives as the main app
# but relaxed for inline scripts/styles required by React.

location /wazuh/ {
    # Wazuh Dashboard (OpenSearch Dashboards / React SPA)
    proxy_pass http://127.0.0.1:5601/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /wazuh;

    # WebSocket support (Wazuh dashboard uses WS for live updates)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;

    # Strip path prefix: /wazuh/foo → /foo
    proxy_redirect / /wazuh/;

    # Wazuh React app needs relaxed CSP — override main server block headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self';" always;

    # Rate limit: Wazuh API calls can be bursty during dashboard load
    limit_req zone=api_rate burst=100 nodelay;
}

location /wazuh/api/ {
    # Wazuh Manager REST API (port 55000) — proxied for authenticated users
    proxy_pass https://127.0.0.1:55000/;
    proxy_http_version 1.1;
    proxy_ssl_verify off;  # Self-signed cert on Wazuh Manager

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 300s;
    proxy_buffering off;

    # API calls are auth-gated by Wazuh JWT — strict rate limit
    limit_req zone=api_rate burst=50 nodelay;
}
