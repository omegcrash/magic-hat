# Magic Hat — Nginx Reverse Proxy for Cockpit Web Admin
# Copyright (c) 2026 George Scott Foley — MIT License
#
# Proxies /cockpit/ → http://localhost:9090 (Cockpit Web Console)
#
# Cockpit Requirements:
#   1. WebSocket upgrade (Cockpit terminal and live updates use WS)
#   2. HTTP/1.1 (Cockpit does not support HTTP/2 on the upstream)
#   3. X-Forwarded-Proto header (Cockpit uses this for HTTPS detection)
#   4. Origin header passthrough (Cockpit validates Origin for CSRF protection)
#
# Security Note: Cockpit performs its own PAM/password authentication.
# Do NOT expose this path without TLS on the outer nginx server block.

location /cockpit/ {
    proxy_pass http://127.0.0.1:9090/cockpit/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CRITICAL: WebSocket upgrade required for Cockpit terminal and live metrics
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Origin passthrough — Cockpit checks Origin header for CSRF protection
    proxy_set_header Origin $scheme://$host;

    proxy_read_timeout 86400s;  # Long timeout for terminal sessions
    proxy_send_timeout 86400s;
    proxy_buffering off;

    # Cockpit is served under /cockpit/ path — no redirect rewriting needed
    # Cockpit knows its prefix from the X-Forwarded-Proto + Host headers

    # Rate limit — Cockpit logins should be throttled
    limit_req zone=general_rate burst=50 nodelay;
}

# Cockpit socket (direct API + WebSocket endpoint)
location /cockpit/socket {
    proxy_pass http://127.0.0.1:9090/cockpit/socket;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin $scheme://$host;

    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
}
