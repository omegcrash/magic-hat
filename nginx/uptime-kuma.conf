# Magic Hat — Nginx Reverse Proxy for Uptime Kuma
# Copyright (c) 2026 George Scott Foley — MIT License
#
# Proxies /status/ → http://localhost:3001 (Uptime Kuma Service Monitor)
#
# Uptime Kuma Requirements:
#   1. WebSocket upgrade (Uptime Kuma uses Socket.IO for live updates)
#   2. Correct base path configuration (set via UPTIME_KUMA_SUBFOLDER env in container)

location /status/ {
    # Uptime Kuma dashboard and status pages
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CRITICAL: Socket.IO (used by Uptime Kuma) requires WebSocket upgrade
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;

    # Rate limit — status page is publicly viewable but keep it reasonable
    limit_req zone=general_rate burst=100 nodelay;
}

# Uptime Kuma Socket.IO endpoint
location /status/socket.io/ {
    proxy_pass http://127.0.0.1:3001/socket.io/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 86400s;  # Long-lived WS connection for live updates
    proxy_send_timeout 86400s;
    proxy_buffering off;
}

# Uptime Kuma REST API — used by Familiar skills/uptime_kuma/skill.py
location /status/api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_buffering off;

    # API rate limit
    limit_req zone=api_rate burst=50 nodelay;
}
