<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Background gradient: deep navy → near-black -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080a12"/>
      <stop offset="50%"  stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#10121e"/>
    </linearGradient>

    <!-- Radial glow behind hat -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%"   stop-color="#3d2880" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Hat body gradient -->
    <radialGradient id="hatBody" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#9b72cf"/>
      <stop offset="100%" stop-color="#4a2a88"/>
    </radialGradient>

    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#7c8cf8" stroke-width="0.4" opacity="0.04">
    <!-- Vertical lines every 80px -->
    <line x1="80"   y1="0" x2="80"   y2="1080"/>
    <line x1="160"  y1="0" x2="160"  y2="1080"/>
    <line x1="240"  y1="0" x2="240"  y2="1080"/>
    <line x1="320"  y1="0" x2="320"  y2="1080"/>
    <line x1="400"  y1="0" x2="400"  y2="1080"/>
    <line x1="480"  y1="0" x2="480"  y2="1080"/>
    <line x1="560"  y1="0" x2="560"  y2="1080"/>
    <line x1="640"  y1="0" x2="640"  y2="1080"/>
    <line x1="720"  y1="0" x2="720"  y2="1080"/>
    <line x1="800"  y1="0" x2="800"  y2="1080"/>
    <line x1="880"  y1="0" x2="880"  y2="1080"/>
    <line x1="960"  y1="0" x2="960"  y2="1080"/>
    <line x1="1040" y1="0" x2="1040" y2="1080"/>
    <line x1="1120" y1="0" x2="1120" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1360" y1="0" x2="1360" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1520" y1="0" x2="1520" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
    <line x1="1760" y1="0" x2="1760" y2="1080"/>
    <line x1="1840" y1="0" x2="1840" y2="1080"/>
    <!-- Horizontal lines every 80px -->
    <line x1="0" y1="80"  x2="1920" y2="80"/>
    <line x1="0" y1="160" x2="1920" y2="160"/>
    <line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="320" x2="1920" y2="320"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="560" x2="1920" y2="560"/>
    <line x1="0" y1="640" x2="1920" y2="640"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="0" y1="880" x2="1920" y2="880"/>
    <line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="0" y1="1040" x2="1920" y2="1040"/>
  </g>

  <!-- Central radial glow -->
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Central magic hat (large, centred) -->
  <g transform="translate(960, 440) scale(4.2)">
    <!-- Brim -->
    <ellipse cx="0" cy="78" rx="90" ry="18" fill="#3d2070" stroke="#2a1558" stroke-width="1.5"/>
    <!-- Body -->
    <path d="M -60 78 Q -66 30 -48 -28 Q -28 -74 0 -78 Q 28 -74 48 -28 Q 66 30 60 78 Z"
          fill="url(#hatBody)" stroke="#2a1558" stroke-width="1.5"/>
    <!-- Band -->
    <path d="M -57 56 Q 0 65 57 56 L 59 67 Q 0 76 -59 67 Z"
          fill="#2a1558" opacity="0.8"/>
    <!-- Star sparkle -->
    <g transform="translate(0, 0)" filter="url(#starGlow)">
      <polygon points="0,-20 4,-7 18,-7 8,2 12,17 0,10 -12,17 -8,2 -18,-7 -4,-7"
               fill="#f0c040" stroke="#c8940a" stroke-width="0.5"/>
    </g>
    <!-- Small accent stars on hat body -->
    <circle cx="-28" cy="-30" r="3.5" fill="#c8a0ff" opacity="0.7"/>
    <circle cx="32"  cy="-44" r="2.5" fill="#c8a0ff" opacity="0.5"/>
    <circle cx="20"  cy="20"  r="2"   fill="#c8a0ff" opacity="0.4"/>
    <circle cx="-22" cy="30"  r="1.5" fill="#c8a0ff" opacity="0.35"/>
  </g>

  <!-- Scattered field stars -->
  <g fill="#c8a0ff">
    <circle cx="142"  cy="96"  r="1.2" opacity="0.5"/>
    <circle cx="380"  cy="220" r="0.8" opacity="0.4"/>
    <circle cx="580"  cy="80"  r="1.5" opacity="0.45"/>
    <circle cx="820"  cy="160" r="0.8" opacity="0.35"/>
    <circle cx="1100" cy="60"  r="1.2" opacity="0.5"/>
    <circle cx="1340" cy="140" r="1.0" opacity="0.4"/>
    <circle cx="1560" cy="90"  r="1.5" opacity="0.45"/>
    <circle cx="1750" cy="200" r="0.8" opacity="0.35"/>
    <circle cx="200"  cy="700" r="1.0" opacity="0.3"/>
    <circle cx="440"  cy="820" r="1.2" opacity="0.35"/>
    <circle cx="700"  cy="900" r="0.8" opacity="0.28"/>
    <circle cx="1200" cy="780" r="1.0" opacity="0.3"/>
    <circle cx="1500" cy="860" r="1.2" opacity="0.35"/>
    <circle cx="1720" cy="760" r="0.8" opacity="0.3"/>
    <circle cx="1850" cy="940" r="1.0" opacity="0.25"/>
  </g>

  <!-- Accent sparkle dots (golden) -->
  <g fill="#f0c040">
    <circle cx="310"  cy="380" r="1.5" opacity="0.3"/>
    <circle cx="1610" cy="290" r="1.5" opacity="0.3"/>
    <circle cx="480"  cy="760" r="1.0" opacity="0.25"/>
    <circle cx="1440" cy="680" r="1.0" opacity="0.25"/>
  </g>

  <!-- Wordmark (bottom-left) -->
  <text x="60" y="1040"
        font-family="Noto Sans, sans-serif"
        font-size="20"
        font-weight="300"
        fill="#2e3050"
        letter-spacing="3"
        opacity="0.8">MAGIC HAT · FAMILIAR AI DESKTOP</text>
</svg>
